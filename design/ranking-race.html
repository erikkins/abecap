<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RigaCap Momentum Rankings — Bar Chart Race</title>
<style>
  :root {
    --navy: #172554;
    --navy-light: #1e3a5f;
    --gold: #f59e0b;
    --gold-dim: #92610a;
    --mega: #94a3b8;
    --large: #60a5fa;
    --mid: #f59e0b;
    --small: #34d399;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --row-h: 28px;
    --row-gap: 3px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--navy);
    border-bottom: 2px solid var(--gold);
  }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--gold); }
  .header .date {
    font-size: 16px; color: var(--text); font-weight: 600;
    background: var(--navy-light); padding: 4px 12px; border-radius: 6px;
  }

  /* Chart area */
  .chart-container {
    position: relative; padding: 12px 24px 8px 24px;
    overflow: hidden;
  }
  .chart-inner { position: relative; width: 100%; }

  /* Individual bar row */
  .bar-row {
    position: absolute; left: 0; right: 0;
    height: var(--row-h);
    display: flex; align-items: center;
    transition: transform 400ms cubic-bezier(0.25, 0.1, 0.25, 1),
                opacity 300ms ease;
    will-change: transform, opacity;
  }
  .bar-row.entering { opacity: 0; }
  .bar-row.visible { opacity: 1; }
  .bar-row.exiting { opacity: 0; pointer-events: none; }

  .rank-num {
    width: 32px; text-align: right; font-size: 11px;
    color: var(--text-dim); margin-right: 6px; flex-shrink: 0;
  }
  .symbol-label {
    width: 52px; font-size: 12px; font-weight: 700;
    flex-shrink: 0; text-align: left;
  }
  .bar-track {
    flex: 1; height: 20px; position: relative;
    border-radius: 3px; overflow: hidden;
    background: rgba(255,255,255,0.03);
  }
  .bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 400ms cubic-bezier(0.25, 0.1, 0.25, 1);
    position: relative;
  }
  .score-label {
    width: 46px; text-align: right; font-size: 11px;
    color: var(--text-dim); margin-left: 6px; flex-shrink: 0;
  }
  .tier-badge {
    width: 22px; text-align: center; font-size: 10px;
    font-weight: 700; margin-left: 4px; flex-shrink: 0;
    border-radius: 3px; padding: 1px 0;
    line-height: 18px;
  }

  /* Cap tier badge colors */
  .tier-M { background: rgba(148,163,184,0.2); color: var(--mega); }
  .tier-L { background: rgba(96,165,250,0.15); color: var(--large); }
  .tier-D { background: rgba(245,158,11,0.2); color: var(--mid); }
  .tier-S { background: rgba(52,211,153,0.2); color: var(--small); }

  /* Bar fill colors by tier */
  .fill-M { background: linear-gradient(90deg, var(--mega), #b0bec5); }
  .fill-L { background: linear-gradient(90deg, #3b82f6, var(--large)); }
  .fill-D { background: linear-gradient(90deg, #d97706, var(--mid)); }
  .fill-S { background: linear-gradient(90deg, #059669, var(--small)); }

  /* Gold glow for mid/small in top 10 */
  .bar-row.glow .bar-fill {
    box-shadow: 0 0 8px rgba(245,158,11,0.5), 0 0 16px rgba(245,158,11,0.25);
  }
  .bar-row.glow .symbol-label {
    color: var(--gold);
    text-shadow: 0 0 6px rgba(245,158,11,0.6);
  }

  /* Controls */
  .controls {
    padding: 12px 24px; background: var(--card);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .controls-row {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap; margin-bottom: 8px;
  }
  .controls-row:last-child { margin-bottom: 0; }

  button {
    background: var(--navy); border: 1px solid rgba(255,255,255,0.12);
    color: var(--text); padding: 4px 10px; border-radius: 4px;
    cursor: pointer; font-family: inherit; font-size: 12px;
    transition: background 150ms, border-color 150ms;
  }
  button:hover { background: var(--navy-light); border-color: var(--gold); }
  button.active { background: var(--gold); color: var(--navy); font-weight: 700; border-color: var(--gold); }

  .timeline-wrap {
    flex: 1; display: flex; align-items: center; gap: 8px; min-width: 200px;
  }
  input[type="range"] {
    flex: 1; accent-color: var(--gold); height: 6px;
    -webkit-appearance: none; background: rgba(255,255,255,0.1);
    border-radius: 3px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: var(--gold); border-radius: 50%; cursor: pointer;
  }
  .frame-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .legend { display: flex; align-items: center; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Tooltip */
  .tooltip {
    position: fixed; background: var(--navy); border: 1px solid var(--gold);
    border-radius: 6px; padding: 8px 12px; font-size: 11px;
    pointer-events: none; z-index: 100; opacity: 0;
    transition: opacity 150ms;
    max-width: 220px;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-sym { font-weight: 700; font-size: 13px; color: var(--gold); }
  .tooltip .tt-row { margin-top: 3px; color: var(--text-dim); }
  .tooltip .tt-val { color: var(--text); font-weight: 600; }

  /* Filter buttons */
  .filter-btn { font-size: 11px; padding: 2px 8px; }
  .filter-btn.active { opacity: 1; }
  .filter-btn.inactive { opacity: 0.4; }

  /* Loading overlay */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 60vh; gap: 16px;
  }
  .loading-text { color: var(--gold); font-size: 16px; }
  .loading-sub { color: var(--text-dim); font-size: 12px; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid rgba(245,158,11,0.2);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Rank delta indicator */
  .rank-delta {
    width: 28px; font-size: 9px; text-align: center; flex-shrink: 0;
  }
  .rank-delta.up { color: var(--small); }
  .rank-delta.down { color: #f87171; }
  .rank-delta.new { color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading ranking data...</div>
    <div class="loading-sub">Drag ranking-history.json here or wait for S3 fetch</div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-sym" id="tt-sym"></div>
  <div class="tt-row">Rank: <span class="tt-val" id="tt-rank"></span></div>
  <div class="tt-row">Score: <span class="tt-val" id="tt-score"></span></div>
  <div class="tt-row">Sector: <span class="tt-val" id="tt-sector"></span></div>
  <div class="tt-row">Tier: <span class="tt-val" id="tt-tier"></span></div>
  <div class="tt-row" id="tt-delta-row">Rank change: <span class="tt-val" id="tt-delta"></span></div>
</div>

<script>
(function() {
  // State
  let DATA = null;
  let frameIdx = 0;
  let playing = false;
  let playInterval = null;
  let speed = 1;       // 1x = 1000ms, 2x = 500ms, 4x = 250ms
  let showN = 25;
  let tierFilter = new Set(["M", "L", "D", "S"]);
  let prevRankMap = {};  // symbol → rank from previous frame

  const app = document.getElementById("app");
  const tooltip = document.getElementById("tooltip");

  // Try loading from multiple sources
  async function loadData() {
    // 1. Check URL param
    const params = new URLSearchParams(location.search);
    const jsonUrl = params.get("data");
    if (jsonUrl) {
      try {
        const resp = await fetch(jsonUrl);
        if (resp.ok) return await resp.json();
      } catch(e) { console.warn("URL param fetch failed:", e); }
    }
    // 2. Try local file (same directory)
    try {
      const resp = await fetch("ranking-history.json");
      if (resp.ok) return await resp.json();
    } catch(e) {}
    // 3. Try /tmp (for local dev after S3 download)
    try {
      const resp = await fetch("/tmp/ranking-history.json");
      if (resp.ok) return await resp.json();
    } catch(e) {}
    return null;
  }

  // Support drag-and-drop JSON
  document.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; });
  document.addEventListener("drop", e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        DATA = JSON.parse(reader.result);
        frameIdx = 0; prevRankMap = {};
        init();
      } catch(err) { alert("Invalid JSON: " + err.message); }
    };
    reader.readAsText(file);
  });

  loadData().then(data => {
    if (data) {
      DATA = data;
      init();
    }
  });

  function init() {
    app.innerHTML = "";

    // Header
    const header = el("div", "header");
    header.innerHTML = `<h1>RigaCap Momentum Rankings</h1><div class="date" id="frame-date">—</div>`;
    app.appendChild(header);

    // Chart
    const chartC = el("div", "chart-container");
    const chartI = el("div", "chart-inner");
    chartI.id = "chart";
    chartC.appendChild(chartI);
    app.appendChild(chartC);

    // Controls
    const controls = el("div", "controls");
    controls.innerHTML = buildControls();
    app.appendChild(controls);

    bindControls();
    renderFrame(0);
    updateChartHeight();
  }

  function buildControls() {
    return `
      <div class="controls-row">
        <button id="btn-start" title="Jump to start">&#x25C0;&#x25C0;</button>
        <button id="btn-prev" title="Previous frame">&#x25C0;</button>
        <button id="btn-play" title="Play/Pause">&#x25B6;</button>
        <button id="btn-next" title="Next frame">&#x25B6;</button>
        <button id="btn-end" title="Jump to end">&#x25B6;&#x25B6;</button>
        <div class="timeline-wrap">
          <input type="range" id="scrubber" min="0" max="${DATA.dates.length - 1}" value="0">
          <span class="frame-label" id="frame-counter">1 / ${DATA.dates.length}</span>
        </div>
        <span style="color:var(--text-dim);font-size:11px;margin-left:4px;">Speed:</span>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="2">2x</button>
        <button class="speed-btn" data-speed="4">4x</button>
      </div>
      <div class="controls-row">
        <span style="color:var(--text-dim);font-size:11px;">Show:</span>
        <button class="show-btn active" data-n="25">25</button>
        <button class="show-btn" data-n="50">50</button>
        <button class="show-btn" data-n="100">100</button>
        <span style="color:var(--text-dim);font-size:11px;margin-left:12px;">Filter:</span>
        <button class="filter-btn active tier-M" data-tier="M" style="border-color:var(--mega)">M</button>
        <button class="filter-btn active tier-L" data-tier="L" style="border-color:var(--large)">L</button>
        <button class="filter-btn active tier-D" data-tier="D" style="border-color:var(--mid)">D</button>
        <button class="filter-btn active tier-S" data-tier="S" style="border-color:var(--small)">S</button>
        <div class="legend" style="margin-left:auto;">
          <div class="legend-item"><div class="legend-dot" style="background:var(--mega)"></div>Mega</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--large)"></div>Large</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--mid)"></div>Mid</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--small)"></div>Small</div>
        </div>
      </div>`;
  }

  function bindControls() {
    document.getElementById("btn-start").onclick = () => { stop(); goTo(0); };
    document.getElementById("btn-end").onclick = () => { stop(); goTo(DATA.dates.length - 1); };
    document.getElementById("btn-prev").onclick = () => { stop(); goTo(Math.max(0, frameIdx - 1)); };
    document.getElementById("btn-next").onclick = () => { stop(); goTo(Math.min(DATA.dates.length - 1, frameIdx + 1)); };
    document.getElementById("btn-play").onclick = togglePlay;
    document.getElementById("scrubber").oninput = e => { stop(); goTo(+e.target.value); };

    document.querySelectorAll(".speed-btn").forEach(b => {
      b.onclick = () => {
        document.querySelectorAll(".speed-btn").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        speed = +b.dataset.speed;
        if (playing) { clearInterval(playInterval); startPlay(); }
      };
    });

    document.querySelectorAll(".show-btn").forEach(b => {
      b.onclick = () => {
        document.querySelectorAll(".show-btn").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        showN = +b.dataset.n;
        renderFrame(frameIdx);
        updateChartHeight();
      };
    });

    document.querySelectorAll(".filter-btn").forEach(b => {
      b.onclick = () => {
        const t = b.dataset.tier;
        if (tierFilter.has(t)) { tierFilter.delete(t); b.classList.remove("active"); b.classList.add("inactive"); }
        else { tierFilter.add(t); b.classList.add("active"); b.classList.remove("inactive"); }
        renderFrame(frameIdx);
        updateChartHeight();
      };
    });

    // Keyboard shortcuts
    document.addEventListener("keydown", e => {
      if (e.key === " ") { e.preventDefault(); togglePlay(); }
      else if (e.key === "ArrowRight") { stop(); goTo(Math.min(DATA.dates.length - 1, frameIdx + 1)); }
      else if (e.key === "ArrowLeft") { stop(); goTo(Math.max(0, frameIdx - 1)); }
      else if (e.key === "Home") { stop(); goTo(0); }
      else if (e.key === "End") { stop(); goTo(DATA.dates.length - 1); }
    });
  }

  function togglePlay() {
    if (playing) stop(); else { if (frameIdx >= DATA.dates.length - 1) frameIdx = 0; startPlay(); }
  }
  function startPlay() {
    playing = true;
    document.getElementById("btn-play").textContent = "⏸";
    const ms = 1000 / speed;
    playInterval = setInterval(() => {
      if (frameIdx >= DATA.dates.length - 1) { stop(); return; }
      goTo(frameIdx + 1);
    }, ms);
  }
  function stop() {
    playing = false;
    if (playInterval) { clearInterval(playInterval); playInterval = null; }
    const btn = document.getElementById("btn-play");
    if (btn) btn.textContent = "\u25B6";
  }
  function goTo(idx) {
    frameIdx = idx;
    renderFrame(idx);
    const scrubber = document.getElementById("scrubber");
    if (scrubber) scrubber.value = idx;
    const counter = document.getElementById("frame-counter");
    if (counter) counter.textContent = `${idx + 1} / ${DATA.dates.length}`;
  }

  // Existing bar elements keyed by symbol
  const barEls = {};

  function renderFrame(idx) {
    const dateStr = DATA.dates[idx];
    const items = DATA.rankings[dateStr] || [];

    document.getElementById("frame-date").textContent = formatDate(dateStr);

    // Filter by tier
    const filtered = items.filter(d => tierFilter.has(d.t));
    const visible = filtered.slice(0, showN);
    const maxScore = visible.length > 0 ? visible[0].sc : 1;

    const chart = document.getElementById("chart");
    const visibleSet = new Set(visible.map(d => d.s));
    const rowH = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--row-h")) +
                 parseInt(getComputedStyle(document.documentElement).getPropertyValue("--row-gap"));

    // Mark bars not in this frame for exit
    for (const sym in barEls) {
      if (!visibleSet.has(sym)) {
        barEls[sym].el.classList.remove("visible");
        barEls[sym].el.classList.add("exiting");
        // Remove after transition
        const toRemove = barEls[sym].el;
        setTimeout(() => { if (toRemove.parentNode) toRemove.parentNode.removeChild(toRemove); }, 350);
        delete barEls[sym];
      }
    }

    // Update or create bars
    visible.forEach((d, i) => {
      const yPos = i * rowH;
      const barPct = Math.max(2, (d.sc / maxScore) * 100);

      // Rank delta
      const prevRank = prevRankMap[d.s];
      let deltaText = "";
      let deltaCls = "";
      if (prevRank === undefined) {
        deltaText = "NEW";
        deltaCls = "new";
      } else {
        const diff = prevRank - (i + 1);
        if (diff > 0) { deltaText = "\u25B2" + diff; deltaCls = "up"; }
        else if (diff < 0) { deltaText = "\u25BC" + Math.abs(diff); deltaCls = "down"; }
      }

      // Glow for mid/small in top 10
      const shouldGlow = (d.t === "D" || d.t === "S") && i < 10;

      if (barEls[d.s]) {
        // Update existing
        const be = barEls[d.s];
        be.el.style.transform = `translateY(${yPos}px)`;
        be.el.className = `bar-row visible${shouldGlow ? " glow" : ""}`;
        be.rankEl.textContent = i + 1;
        be.fillEl.style.width = barPct + "%";
        be.scoreEl.textContent = d.sc.toFixed(1);
        be.deltaEl.textContent = deltaText;
        be.deltaEl.className = `rank-delta ${deltaCls}`;
        be.data = d;
        be.visibleRank = i + 1;
      } else {
        // Create new bar
        const row = el("div", `bar-row entering${shouldGlow ? " glow" : ""}`);
        row.style.transform = `translateY(${yPos}px)`;

        const rankEl = el("span", "rank-num");
        rankEl.textContent = i + 1;

        const symEl = el("span", "symbol-label");
        symEl.textContent = d.s;
        symEl.style.color = tierColor(d.t);

        const track = el("div", "bar-track");
        const fill = el("div", `bar-fill fill-${d.t}`);
        fill.style.width = barPct + "%";
        track.appendChild(fill);

        const scoreEl = el("span", "score-label");
        scoreEl.textContent = d.sc.toFixed(1);

        const tierEl = el("span", `tier-badge tier-${d.t}`);
        tierEl.textContent = d.t;

        const deltaEl = el("span", `rank-delta ${deltaCls}`);
        deltaEl.textContent = deltaText;

        row.appendChild(rankEl);
        row.appendChild(symEl);
        row.appendChild(track);
        row.appendChild(scoreEl);
        row.appendChild(tierEl);
        row.appendChild(deltaEl);

        // Tooltip events
        row.addEventListener("mouseenter", e => showTooltip(e, d, i + 1));
        row.addEventListener("mousemove", e => moveTooltip(e));
        row.addEventListener("mouseleave", hideTooltip);

        chart.appendChild(row);

        // Trigger enter animation
        requestAnimationFrame(() => {
          row.classList.remove("entering");
          row.classList.add("visible");
        });

        barEls[d.s] = { el: row, rankEl, symEl, fillEl: fill, scoreEl, tierEl, deltaEl, data: d, visibleRank: i + 1 };
      }
    });

    // Update prevRankMap for next frame
    prevRankMap = {};
    visible.forEach((d, i) => { prevRankMap[d.s] = i + 1; });
  }

  function updateChartHeight() {
    const rowH = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--row-h")) +
                 parseInt(getComputedStyle(document.documentElement).getPropertyValue("--row-gap"));
    const chart = document.getElementById("chart");
    if (chart) chart.style.height = (showN * rowH + 8) + "px";
  }

  function showTooltip(e, d, rank) {
    const prevRank = prevRankMap[d.s];
    document.getElementById("tt-sym").textContent = d.s;
    document.getElementById("tt-rank").textContent = "#" + rank;
    document.getElementById("tt-score").textContent = d.sc.toFixed(2);
    document.getElementById("tt-sector").textContent = d.sec || "—";
    const tierNames = { M: "Mega Cap", L: "Large Cap", D: "Mid Cap", S: "Small Cap" };
    document.getElementById("tt-tier").textContent = tierNames[d.t] || d.t;

    // For tooltip, recalculate from the stored bar data (prevRankMap reflects current frame)
    const be = barEls[d.s];
    const deltaRow = document.getElementById("tt-delta-row");
    if (be && be.deltaEl.textContent) {
      deltaRow.style.display = "";
      document.getElementById("tt-delta").textContent = be.deltaEl.textContent;
    } else {
      deltaRow.style.display = "none";
    }

    tooltip.classList.add("show");
    moveTooltip(e);
  }
  function moveTooltip(e) {
    tooltip.style.left = (e.clientX + 12) + "px";
    tooltip.style.top = (e.clientY - 10) + "px";
  }
  function hideTooltip() { tooltip.classList.remove("show"); }

  function tierColor(t) {
    return { M: "var(--mega)", L: "var(--large)", D: "var(--mid)", S: "var(--small)" }[t] || "var(--text)";
  }

  function formatDate(ds) {
    const [y, m, d] = ds.split("-");
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[+m - 1]} ${+d}, ${y}`;
  }

  function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }
})();
</script>
</body>
</html>
